# Test Parameter Scan - Cartesian Product Expansion
name: "test_cartesian_scan"

engine:
  sde:
    t0: 0.0
    t1: 1.0
    dt: 0.01
    n_traj: 2
    seed: 42
    ic:
      - ["1.0+0.0j", "0.0+0.0j"]

backend:
  numpy:
    float_dtype: float64

integrator:
  euler_maruyama:
    dt: 0.01

model:
  vdp_2mode:
    omega_a: [0.9, 1.1]      # 2 values
    omega_b: 1.0
    gamma_a: [0.05, 0.1]     # 2 values
    gamma_b: 0.1
    Gamma: 1.0
    g: 0.5
    D: 1.0

# Expected: 2 (omega_a) * 2 (gamma_a) = 4 jobs
