# Test SDE Job - Single Job Format
name: "test_simulation"

engine:
  sde:
    t0: 0.0
    t1: 1.0
    dt: 0.01
    n_traj: 4
    seed: 42
    ic:
      - ["1.0+0.0j", "0.0+0.0j"]

backend:
  numpy:
    float_dtype: float64

integrator:
  euler_maruyama:
    dt: 0.01

model:
  vdp_2mode:
    omega_a: 1.0
    omega_b: 1.0
    gamma_a: 0.1
    gamma_b: 0.1
    Gamma: 1.0
    g: 0.5
    D: 1.0
