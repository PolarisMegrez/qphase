name: CI

on:
  push:
    branches: ["main", "stable"]
  pull_request:
    branches: ["main", "stable"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        # Install the full development environment, which includes all backends
        # (numpy/numba/torch/cupy), CLI, GUI, resource packages, and test tools.
        run: uv sync --dev

      - name: Lint with Ruff
        run: uv run ruff check .

      - name: Type check with MyPy
        run: uv run mypy .

      - name: Run tests
        run: uv run pytest
