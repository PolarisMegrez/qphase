name: Publish to PyPI (manual)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish (tag or branch)"
        required: true
        default: "stable"

jobs:
  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build packages
        run: |
          python -m build packages/qphase
          python -m build packages/qphase_sde
          python -m build packages/qphase_viz

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages_dir: packages/*/dist/
