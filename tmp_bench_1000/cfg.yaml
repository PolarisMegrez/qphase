
- name: bench_sim
  save: false
  engine:
    sde:
      t0: 0.0
      t1: 1000.0
      dt: 0.1
      n_traj: 10
      seed: 42
      ic:
        - ["800.0+0.0j", "0.0-800.0j"]
      adaptive: false
      save_stride: 1
      keep_traj: false
  backend:
    numpy:
      float_dtype: float64
  integrator:
    srk:
      method: heun
  model:
    vdp_level3:
      omega_a: 0.00251189
      omega_b: 0.0
      gamma_a: 2.0
      gamma_b: 1.0
      Gamma: 0.00001
      g: 0.5
      D: 1.0
