# QPhase Plugin Directory Configuration
plugins:
  - type: model.kerr_3pa
    target: models.kerr_3pa:Kerr3PAModel
    description: Kerr nonlinear cavity model with 3PA
  - type: model.kerr_3mode
    target: models.kerr_3mode:Kerr3ModeModel
    description: Kerr nonlinear cavity model with three modes
  - type: model.vdp_level3
    target: models.vdp_level3:VDPLevel3Model
    description: Van der Pol Oscillator (SDE Model)
