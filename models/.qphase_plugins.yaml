# QPhase local model plugins
plugins:
  - type: model.vdp_2mode
    target: models.vdp_2mode:VDP2ModeModel
    description: Two-mode van der Pol oscillator
  - type: model.kerr_2mode
    target: models.kerr_2mode:Kerr2ModeModel
    description: Two-mode Kerr oscillator
  - type: model.kerr_3mode
    target: models.kerr_3mode:Kerr3ModeModel
    description: Three-mode Kerr oscillator
