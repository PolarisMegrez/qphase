- name: vdp_2mode_cayley_sim
  save: true
  engine:
    sde:
      t0: 0.0
      t1: 200000.0
      dt: 0.1
      n_traj: 100
      seed: 42
      ic:
        - ["800.0+0.0j", "0.0-800.0j"]
      adaptive: false
      save_stride: 40
      record_modes: [0]
      keep_traj: false
  backend:
    cupy:
      float_dtype: float32
      device: cuda
  integrator:
    cayley_maruyama:
      fused: required
      chunk_steps: 128
      max_modes: 16
  model:
    vdp_2mode:
      # Combined logarithmic scan previously split across two GPU jobs.
      omega_a: [0.001     , 0.00116591, 0.00135936, 0.00158489,
                0.00184785, 0.00215443, 0.00251189, 0.00292864,
                0.00341455, 0.00398107, 0.00464159, 0.0054117 ,
                0.00630957, 0.00735642, 0.00857696, 0.01      ,
                0.01165914, 0.01359356, 0.01584893, 0.0184785 ,
                0.02154435, 0.02511886, 0.02928645, 0.03414549,
                0.03981072, 0.04641589, 0.05411695, 0.06309573,
                0.07356423, 0.08576959, 0.1       ]
      omega_b: 0.0
      gamma_a: 2.0
      gamma_b: 1.0
      Gamma: 0.00001
      g: 0.5
      D: 1.0
  analyser:
    psd:
      modes: [0]
      kind: complex
      find_peaks: true

- name: vdp_2mode_cayley_fit
  input: vdp_2mode_cayley_sim
  aggregate_input:
    on: params.omega_a
  save: true
  engine:
    sde:
      mode: analyze
  analyser:
    lorentz_fitter:
      scan_param: omega_a
      mode: 0
      uncertainty: auto
      clip_by_std: true
      clip_sigma: 10.0
      export:
        - fit_results.csv
        - psd_merged.csv
