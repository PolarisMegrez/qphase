- name: vdp_2mode_cayley_sim
  save: true
  engine:
    sde:
      t0: 0.0
      t1: 500000.0
      dt: 0.1
      n_traj: 200
      seed: 42
      ic:
        - ["800.0+0.0j", "0.0-800.0j"]
      adaptive: false
      # Saved dt=9 gives angular Nyquist pi/9=0.349, above the 0.34 guard.
      save_stride: 90
      record_modes: [0]
      keep_traj: false
  backend:
    cupy:
      float_dtype: float32
      device: cuda
  integrator:
    cayley_maruyama:
      fused: required
      chunk_steps: 128
      max_modes: 16
  model:
    vdp_2mode:
      # Combined logarithmic scan previously split across two GPU jobs.
      omega_a: [0.001     , 0.00109648, 0.00120226, 0.00131826, 0.00144544,
                0.00158489, 0.0017378 , 0.00190546, 0.0020893 , 0.00229087,
                0.00251189, 0.00275423, 0.00301995, 0.00331131, 0.00363078,
                0.00398107, 0.00436516, 0.0047863 , 0.00524807, 0.0057544 ,
                0.00630957, 0.00691831, 0.00758578, 0.00831764, 0.00912011,
                0.01      , 0.01096478, 0.01202264, 0.01318257, 0.0144544 ,
                0.01584893, 0.01737801, 0.01905461, 0.02089296, 0.02290868,
                0.02511886, 0.02754229, 0.03019952, 0.03311311, 0.03630781,
                0.03981072, 0.04365158, 0.04786301, 0.05248075, 0.05754399,
                0.06309573, 0.0691831 , 0.07585776, 0.08317638, 0.09120108,
                0.1       ]
      omega_b: 0.0
      gamma_a: 2.0
      gamma_b: 1.0
      Gamma: 0.00001
      g: 0.5
      D: 1.0
  analyser:
    psd:
      modes: [0]
      kind: complex
      expected_freq_max: 0.34
      find_peaks: true

- name: vdp_2mode_cayley_fit
  input: vdp_2mode_cayley_sim
  aggregate_input:
    on: params.omega_a
  save: true
  engine:
    sde:
      mode: analyze
  analyser:
    lorentz_fitter:
      scan_param: omega_a
      mode: 0
      uncertainty: auto
      clip_by_std: true
      clip_sigma: 10.0
      export:
        - fit_results.csv
        - psd_merged.csv
