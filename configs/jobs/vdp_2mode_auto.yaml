- name: vdp_2mode_auto_sim
  save: true
  engine:
    sde:
      t0: 0.0
      t1: 5000.0
      dt: 0.1
      n_traj: 100
      seed: 42
      ic:
        - ["800.0+0.0j", "0.0-800.0j"]
      adaptive: false
      save_stride: 20
      keep_traj: false
  backend:
    numpy:
      float_dtype: float64
  integrator:
    srk:
      method: heun
  model:
    vdp_2mode:
      omega_a: 0.00251189
      omega_b: 0.0
      gamma_a: 2.0
      gamma_b: 1.0
      Gamma: 0.00001
      g: 0.5
  analyser:
    psd:
      modes: [0]
      kind: complex
      find_peaks: true

- name: vdp_2mode_auto_fit
  input: vdp_2mode_auto_sim
  aggregate_input:
    on: params.omega_a
  save: true
  engine:
    sde:
      mode: analyze
  analyser:
    lorentz_fitter:
      scan_param: omega_a
      mode: 0
      clip_by_std: true
      clip_sigma: 10.0
      export:
        - fit_results.csv
        - psd_merged.csv
