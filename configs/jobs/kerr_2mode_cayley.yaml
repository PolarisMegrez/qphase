name: kerr_2mode_cayley
save: true

engine:
  sde:
    t0: 0.0
    t1: 5000.0
    dt: 0.05
    n_traj: 500
    seed: 42
    ic:
      - ["1.0+0.0j", "0.0+0.0j"]
    adaptive: false
    save_stride: 2
    record_modes: [0]
    keep_traj: false

backend:
  cupy:
    float_dtype: float32
    device: cuda

integrator:
  cayley_maruyama:
    fused: "off"
    max_modes: 16

model:
  kerr_2mode:
    omega_a: 0.0
    omega_b: [-0.001, -0.01, -0.1]
    chi: 0.01
    gamma_a: 0.5
    gamma_b: 1.8728
    g: 0.5

analyser:
  psd:
    modes: [0]
    kind: complex
    find_peaks: true
